---
- name: Master bootstrap
  block:
    - name: Install Docker
      apt:
        name: 
          - docker.io
          - chrony
        state: present
        update_cache: yes

    - name: Enable and start Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Install base dependencies
      apt:
        name: [cephadm, ceph-common, openssh-server]
        state: present
        update_cache: yes

    - name: Bootstrap Ceph cluster using cephadm
      command: >
        cephadm bootstrap
        --mon-ip {{ ansible_host }}
        --initial-dashboard-user {{ ceph_dashboard_user }}
        --initial-dashboard-password {{ ceph_dashboard_password }}
        --cluster-network {{ ceph_cluster_network }}
        --ssh-user {{ ceph_ssh_user }}
      args:
        creates: /etc/ceph/ceph.conf

    - name: Get Ceph Public Key
      command: ceph cephadm get-pub-key
      register: ceph_pub_key
      delegate_to: node-master
      changed_when: false

    - name: Save Ceph Public Key to file on Master
      copy:
        content: "{{ ceph_pub_key.stdout }}"
        dest: "/home/{{ ceph_ssh_user }}/ceph.pub"
        owner: "{{ ceph_ssh_user }}"
        group: "{{ ceph_ssh_user }}"
        mode: '0644'
  when: inventory_hostname in groups['master']
  become: true